<!DOCTYPE html>
<html>
<head>
  <title>Supabase Auth Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
</head>
<body>
  <h2>Sign Up</h2>
  <form id="signupForm">
    <input type="email" name="signup_email" placeholder="Email" required />
    <input type="password" name="signup_password" placeholder="Password" required />
    <button type="submit">Sign Up</button>
  </form>

  <hr/>

  <h2>Sign In</h2>
  <form id="signinForm">
    <input type="email" name="signin_email" placeholder="Email" required />
    <input type="password" name="signin_password" placeholder="Password" required />
    <button type="submit">Sign In</button>
  </form>

  <hr/>

  <button id="signoutBtn">Sign Out</button>
  <div id="output"></div>

  <script>
    // Replace with your Supabase project details
    const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR-PUBLIC-ANON-KEY";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const outputDiv = document.getElementById('output');

    // SIGN-UP
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = e.target.signup_email.value;
      const password = e.target.signup_password.value;
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) {
        outputDiv.textContent = "Signup error: " + error.message;
      } else {
        outputDiv.textContent = "Signup successful! Please check your email for confirmation.";
      }
    });

    // SIGN-IN
    document.getElementById('signinForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = e.target.signin_email.value;
      const password = e.target.signin_password.value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        outputDiv.textContent = "Sign-in error: " + error.message;
      } else {
        outputDiv.textContent = "Sign-in successful! Welcome, " + data.user.email;
      }
    });

    // SIGN-OUT
    document.getElementById('signoutBtn').addEventListener('click', async function() {
      const { error } = await supabase.auth.signOut();
      if (error) {
        outputDiv.textContent = "Sign-out error: " + error.message;
      } else {
        outputDiv.textContent = "Signed out!";
      }
    });
  </script>
</body>
</html>
