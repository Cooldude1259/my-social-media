<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ConnectEd · Admin</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      .wrap { max-width: 720px; margin: 0 auto; }
      .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 18px; margin-bottom: 14px; backdrop-filter: blur(10px); animation: none; }
      .gate { text-align: center; margin-top: 60px; }
      .role-badge { display: inline-block; font-size: 12px; font-family: "Orbitron", sans-serif; letter-spacing: 1px; padding: 4px 12px; border-radius: 12px; background: rgba(139,92,246,0.25); color: #c4b5fd; }
      .tabs { display: flex; gap: 8px; justify-content: center; margin: 18px 0; flex-wrap: wrap; }
      .tabs button { animation: none; padding: 8px 18px; font-size: 14px; background: rgba(255,255,255,0.08); }
      .tabs button.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
      .tabs button:hover { box-shadow: none; }
      .muted { color: rgba(255,255,255,0.5); }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
      .pill { font-size: 11px; padding: 3px 10px; border-radius: 12px; }
      .pill.post { background: rgba(99,102,241,0.22); color: #c7d2fe; }
      .pill.comment { background: rgba(236,72,153,0.18); color: #f9a8d4; }
      .pill.removed { background: rgba(239,68,68,0.2); color: #fca5a5; }
      .pill.active { background: rgba(34,197,94,0.18); color: #86efac; }
      .target { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px 12px; margin: 8px 0; white-space: pre-wrap; word-break: break-word; }
      .acts { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .acts button { animation: none; padding: 6px 14px; font-size: 13px; }
      .btn-danger { background: rgba(239,68,68,0.85); }
      .btn-neutral { background: rgba(255,255,255,0.12); }
      .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .admin-row:last-child { border-bottom: none; }
      input, select { background: rgba(10,10,10,0.6); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 10px; padding: 9px 12px; font-family: "Quicksand", sans-serif; font-size: 14px; }
      input:focus, select:focus { outline: none; border-color: #8b5cf6; }
      .find-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
      .updates-editor { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr); gap: 14px; }
      .updates-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0 14px; }
      .updates-toolbar input, .updates-toolbar select { min-width: 140px; }
      .updates-stats { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 2px; }
      .updates-stat {
        padding: 8px 12px; border-radius: 12px; background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08); font-size: 12px; color: rgba(255,255,255,0.75);
      }
      .updates-quick-add { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .updates-quick-add button { animation: none; padding: 6px 12px; font-size: 13px; background: rgba(255,255,255,0.08); }
      .updates-editor textarea {
        width: 100%; min-height: 150px; resize: vertical; background: rgba(10,10,10,0.6);
        border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 12px; padding: 10px 12px;
        font-family: "Quicksand", sans-serif; font-size: 14px;
      }
      .updates-editor textarea:focus { outline: none; border-color: #8b5cf6; }
      .updates-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
      .updates-item {
        border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; background: rgba(255,255,255,0.03);
      }
      .updates-item-head { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; }
      .updates-item-title { font-weight: 700; }
      .updates-item-body { margin-top: 8px; color: rgba(255,255,255,0.78); white-space: pre-wrap; word-break: break-word; }
      .updates-item-meta { margin-top: 8px; color: rgba(255,255,255,0.45); font-size: 12px; }
      .updates-item-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .audit-item { font-size: 13px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
      .audit-item .a-act { color: #c4b5fd; font-weight: 600; }
      .audit-item .a-meta { color: rgba(255,255,255,0.45); font-size: 11px; }
      .status { text-align: center; min-height: 18px; color: #a78bfa; font-size: 14px; margin-top: 8px; }
      .hidden { display: none !important; }
      h1 { font-size: 26px; }
    </style>
  </head>
  <body>
    <div class="blob-container"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>

    <div class="content-wrapper">
      <div class="wrap">
        <h1 style="text-align:center;">ADMIN</h1>

        <!-- Gate: shown until we confirm an admin session -->
        <div id="gate" class="gate">
          <p id="gateMsg" class="muted">Checking access…</p>
          <p id="gateActions" class="hidden" style="margin-top:14px;">
            <button id="signInBtn" class="btn-google" style="background:#fff;color:#1f2937;display:inline-flex;gap:10px;align-items:center;">Continue with Google</button>
          </p>
        </div>

        <!-- Console -->
        <div id="console" class="hidden">
          <div class="glass row">
            <div>Signed in as <b id="meName"></b> <span class="role-badge" id="meRole"></span></div>
            <button class="btn-secondary" id="signOutBtn" style="animation:none;padding:6px 14px;font-size:13px;background:rgba(255,255,255,0.1);">Sign out</button>
          </div>

          <div class="tabs">
            <button id="tabReports" class="active">Reports</button>
            <button id="tabAreas">Areas</button>
            <button id="tabUpdates" class="hidden">Updates</button>
            <button id="tabAdmins" class="hidden">Admins</button>
            <button id="tabAudit">Audit log</button>
          </div>

          <div id="viewReports"></div>
          <div id="viewAreas" class="hidden"></div>
          <div id="viewUpdates" class="hidden"></div>
          <div id="viewAdmins" class="hidden"></div>
          <div id="viewAudit" class="hidden"></div>
        </div>

        <p style="text-align:center; margin-top:24px;"><a href="index.html"><button style="animation:none;">← Back to app</button></a></p>
      </div>
    </div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
