<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ConnectEd · App</title>
    <link rel="stylesheet" href="app://root/style.css" />
    <style>
      /* Feed-specific styles (not shared across pages) */
      .feed {
        max-width: 640px;
        margin: 0 auto;
      }

      .composer {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(139, 92, 246, 0.35);
        border-radius: 18px;
        padding: 20px;
        margin: 30px 0;
        backdrop-filter: blur(8px);
      }

      .composer input,
      .composer textarea {
        width: 100%;
        background: rgba(10, 10, 10, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        border-radius: 12px;
        padding: 12px 14px;
        font-family: "Quicksand", sans-serif;
        font-size: 15px;
        margin-bottom: 12px;
        resize: vertical;
      }

      .composer input:focus,
      .composer textarea:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
      }

      .composer button {
        animation: none;
        width: 100%;
      }

      .status {
        text-align: center;
        min-height: 20px;
        margin-top: 10px;
        font-size: 14px;
        color: #a78bfa;
      }

      .post {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px 18px;
        margin-bottom: 14px;
        animation: none;
      }

      .post-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
        gap: 12px;
      }

      .post-author {
        font-weight: 700;
        color: #c4b5fd;
      }

      .post-time {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.45);
        white-space: nowrap;
      }

      .post-title {
        font-family: "Orbitron", sans-serif;
        font-size: 17px;
        margin-bottom: 6px;
        animation: none;
      }

      .post-content {
        animation: none;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        animation: none;
      }
    </style>
  </head>
  <body>
    <div class="blob-container">
      <div class="blob blob1"></div>
      <div class="blob blob2"></div>
      <div class="blob blob3"></div>
    </div>

    <div class="content-wrapper">
      <div class="feed">
        <h1 style="text-align: center;">CONNECTED</h1>
        <p style="text-align: center;">Share something with the <x style="font-family: 'Orbitron', sans-serif;">SCHOOL</x>.</p>

        <form class="composer" id="composer">
          <input id="author" type="text" maxlength="80" placeholder="Your name" required />
          <input id="title" type="text" maxlength="200" placeholder="Title (optional)" />
          <textarea id="content" rows="3" maxlength="4000" placeholder="What do you want to share?" required></textarea>
          <button type="submit" id="postBtn">Post</button>
          <div class="status" id="status"></div>
        </form>

        <div id="posts">
          <p class="empty">Loading the feed…</p>
        </div>

        <p style="text-align: center; margin-top: 30px;">
          <a href="app://root/index.html">
            <button>Go back home</button>
          </a>
        </p>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // ConnectEd Cloud project (public publishable key — safe for the browser;
      // access is governed by Row Level Security policies on the database).
      const SUPABASE_URL = 'https://bmfbnydcanksjwquljzb.supabase.co';
      const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_qa7veCIyFBL1_BYNFOCsXQ_cfHGKyh0';

      // The social-media data model lives in the "social-media-public" schema.
      const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        db: { schema: 'social-media-public' },
      });

      const postsEl = document.getElementById('posts');
      const statusEl = document.getElementById('status');
      const form = document.getElementById('composer');
      const authorEl = document.getElementById('author');
      const titleEl = document.getElementById('title');
      const contentEl = document.getElementById('content');
      const postBtn = document.getElementById('postBtn');

      const escapeHtml = (str) =>
        String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');

      const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return isNaN(d) ? '' : d.toLocaleString();
      };

      function renderPosts(rows) {
        if (!rows || rows.length === 0) {
          postsEl.innerHTML = '<p class="empty">No posts yet — be the first to share!</p>';
          return;
        }
        postsEl.innerHTML = rows
          .map((row) => {
            const author = row.Users && row.Users.Name ? row.Users.Name : 'Unknown';
            const titleHtml = row.title
              ? `<div class="post-title">${escapeHtml(row.title)}</div>`
              : '';
            return `
              <div class="post">
                <div class="post-head">
                  <span class="post-author">${escapeHtml(author)}</span>
                  <span class="post-time">${escapeHtml(formatTime(row.created_at))}</span>
                </div>
                ${titleHtml}
                <div class="post-content">${escapeHtml(row.content)}</div>
              </div>`;
          })
          .join('');
      }

      async function loadFeed() {
        const { data, error } = await supabase
          .from('Posts')
          .select('post-id, title, content, created_at, Users(Name)')
          .order('created_at', { ascending: false })
          .limit(100);

        if (error) {
          postsEl.innerHTML =
            '<p class="empty">Could not load the feed. Please try again later.</p>';
          console.error(error);
          return;
        }
        renderPosts(data);
      }

      // Find the user with this name, or create one, and return their creator-id.
      async function getOrCreateUser(name) {
        const { data: existing, error: selErr } = await supabase
          .from('Users')
          .select('creator-id')
          .eq('Name', name)
          .limit(1);
        if (selErr) throw selErr;
        if (existing && existing.length) return existing[0]['creator-id'];

        const { data: created, error: insErr } = await supabase
          .from('Users')
          .insert({ Name: name })
          .select('creator-id')
          .single();
        if (insErr) throw insErr;
        return created['creator-id'];
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const name = authorEl.value.trim();
        const title = titleEl.value.trim();
        const content = contentEl.value.trim();
        if (!name || !content) return;

        postBtn.disabled = true;
        statusEl.textContent = 'Posting…';

        try {
          const creatorId = await getOrCreateUser(name);
          const { error } = await supabase.from('Posts').insert({
            title: title || null,
            content,
            'creator-id': creatorId,
          });
          if (error) throw error;

          contentEl.value = '';
          titleEl.value = '';
          statusEl.textContent = 'Posted!';
          setTimeout(() => (statusEl.textContent = ''), 2000);
          loadFeed();
        } catch (err) {
          statusEl.textContent = 'Something went wrong. Please try again.';
          console.error(err);
        } finally {
          postBtn.disabled = false;
        }
      });

      loadFeed();
    </script>
  </body>
</html>
