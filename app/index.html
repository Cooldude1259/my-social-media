<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ConnectEd · App</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      /* Feed-specific styles (not shared across pages) */
      .feed {
        max-width: 640px;
        margin: 0 auto;
      }

      .auth-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        margin: 24px 0 4px;
      }

      .auth-user {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        color: #c4b5fd;
      }

      .auth-user img {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid rgba(139, 92, 246, 0.6);
      }

      .btn-secondary {
        animation: none;
        padding: 8px 18px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.08);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.16);
        box-shadow: none;
      }

      .btn-google {
        animation: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #ffffff;
        color: #1f2937;
      }

      .btn-google:hover {
        background: #f1f1f1;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
      }

      .btn-google svg { width: 18px; height: 18px; }

      .composer {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(139, 92, 246, 0.35);
        border-radius: 18px;
        padding: 20px;
        margin: 20px 0 30px;
        backdrop-filter: blur(8px);
      }

      .composer input,
      .composer textarea {
        width: 100%;
        background: rgba(10, 10, 10, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        border-radius: 12px;
        padding: 12px 14px;
        font-family: "Quicksand", sans-serif;
        font-size: 15px;
        margin-bottom: 12px;
        resize: vertical;
      }

      .composer input:focus,
      .composer textarea:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
      }

      .composer button {
        animation: none;
        width: 100%;
      }

      .status {
        text-align: center;
        min-height: 20px;
        margin-top: 10px;
        font-size: 14px;
        color: #a78bfa;
      }

      .signin-prompt {
        text-align: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 24px 20px;
        margin: 20px 0 30px;
        animation: none;
      }

      .signin-prompt p { animation: none; margin-bottom: 14px; }

      .post {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px 18px;
        margin-bottom: 14px;
        animation: none;
      }

      .post-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
        gap: 12px;
      }

      .post-author { font-weight: 700; color: #c4b5fd; }

      .post-time {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.45);
        white-space: nowrap;
      }

      .post-title {
        font-family: "Orbitron", sans-serif;
        font-size: 17px;
        margin-bottom: 6px;
        animation: none;
      }

      .post-content {
        animation: none;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        animation: none;
      }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="blob-container">
      <div class="blob blob1"></div>
      <div class="blob blob2"></div>
      <div class="blob blob3"></div>
    </div>

    <div class="content-wrapper">
      <div class="feed">
        <h1 style="text-align: center;">CONNECTED</h1>
        <p style="text-align: center;">Share something with the <x style="font-family: 'Orbitron', sans-serif;">SCHOOL</x>.</p>

        <!-- Auth state -->
        <div class="auth-bar">
          <div class="auth-user hidden" id="authUser">
            <img id="userAvatar" alt="" />
            <span id="userName"></span>
          </div>
          <button class="btn-secondary hidden" id="signOutBtn">Sign out</button>
        </div>

        <!-- Signed-out prompt -->
        <div class="signin-prompt" id="signinPrompt">
          <p>Sign in to post to the feed.</p>
          <button class="btn-google" id="signInBtn">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
          </button>
        </div>

        <!-- Composer (only usable when signed in) -->
        <form class="composer hidden" id="composer">
          <input id="title" type="text" maxlength="200" placeholder="Title (optional)" />
          <textarea id="content" rows="3" maxlength="4000" placeholder="What do you want to share?" required></textarea>
          <button type="submit" id="postBtn">Post</button>
          <div class="status" id="status"></div>
        </form>

        <div id="posts">
          <p class="empty">Loading the feed…</p>
        </div>

        <p style="text-align: center; margin-top: 30px;">
          <a href="../index.html">
            <button>Go back home</button>
          </a>
        </p>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // ConnectEd Cloud project (public publishable key — safe for the browser;
      // access is governed by Row Level Security policies on the database).
      const SUPABASE_URL = 'https://bmfbnydcanksjwquljzb.supabase.co';
      const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_qa7veCIyFBL1_BYNFOCsXQ_cfHGKyh0';

      // The social-media data model lives in the "social-media-public" schema.
      const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        db: { schema: 'social-media-public' },
        auth: { flowType: 'pkce', detectSessionInUrl: true, persistSession: true },
      });

      // Is the native iOS shell present? If so we route Google sign-in through
      // the native layer (the embedded webview itself can't do Google OAuth).
      const NATIVE_AUTH =
        !!(window.webkit &&
           window.webkit.messageHandlers &&
           window.webkit.messageHandlers.nativeAuth);

      const els = {
        posts: document.getElementById('posts'),
        status: document.getElementById('status'),
        form: document.getElementById('composer'),
        title: document.getElementById('title'),
        content: document.getElementById('content'),
        postBtn: document.getElementById('postBtn'),
        signinPrompt: document.getElementById('signinPrompt'),
        signInBtn: document.getElementById('signInBtn'),
        signOutBtn: document.getElementById('signOutBtn'),
        authUser: document.getElementById('authUser'),
        userName: document.getElementById('userName'),
        userAvatar: document.getElementById('userAvatar'),
      };

      let currentProfile = null; // { 'creator-id', Name }

      const escapeHtml = (str) =>
        String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');

      const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return isNaN(d) ? '' : d.toLocaleString();
      };

      // ---- Auth ----------------------------------------------------------

      // Called by the native Swift layer after a successful Google sign-in.
      window.onNativeAuth = async (accessToken, refreshToken) => {
        const { error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });
        if (error) console.error('setSession failed', error);
        // onAuthStateChange updates the UI.
      };

      async function signIn() {
        if (NATIVE_AUTH) {
          window.webkit.messageHandlers.nativeAuth.postMessage({ action: 'signIn' });
          return;
        }
        // Browser fallback (works outside the embedded webview).
        const redirectTo = window.location.href.split('#')[0].split('?')[0];
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo },
        });
        if (error) console.error('signInWithOAuth failed', error);
      }

      async function signOut() {
        await supabase.auth.signOut();
        if (NATIVE_AUTH) {
          window.webkit.messageHandlers.nativeAuth.postMessage({ action: 'signOut' });
        }
      }

      // Make sure a profile row exists for this user (the DB trigger normally
      // creates it on signup; this is a safety net) and cache it.
      async function ensureProfile(user) {
        const { data, error } = await supabase
          .from('Users')
          .select('creator-id, Name')
          .eq('user_id', user.id)
          .limit(1);
        if (error) throw error;
        if (data && data.length) return data[0];

        const name =
          user.user_metadata?.full_name ||
          user.user_metadata?.name ||
          user.email ||
          'Member';
        const avatar = user.user_metadata?.avatar_url || null;
        const ins = await supabase
          .from('Users')
          .insert({ Name: name, user_id: user.id, avatar_url: avatar })
          .select('creator-id, Name')
          .single();
        if (ins.error) throw ins.error;
        return ins.data;
      }

      async function applyAuthState(session) {
        const user = session?.user || null;
        if (user) {
          try {
            currentProfile = await ensureProfile(user);
          } catch (e) {
            console.error('ensureProfile failed', e);
            currentProfile = null;
          }
          const name =
            currentProfile?.Name ||
            user.user_metadata?.full_name ||
            user.email ||
            'Member';
          els.userName.textContent = name;
          const avatar = user.user_metadata?.avatar_url;
          if (avatar) {
            els.userAvatar.src = avatar;
            els.userAvatar.classList.remove('hidden');
          } else {
            els.userAvatar.classList.add('hidden');
          }
          els.authUser.classList.remove('hidden');
          els.signOutBtn.classList.remove('hidden');
          els.signinPrompt.classList.add('hidden');
          els.form.classList.remove('hidden');
        } else {
          currentProfile = null;
          els.authUser.classList.add('hidden');
          els.signOutBtn.classList.add('hidden');
          els.signinPrompt.classList.remove('hidden');
          els.form.classList.add('hidden');
        }
      }

      supabase.auth.onAuthStateChange((_event, session) => {
        applyAuthState(session);
      });

      els.signInBtn.addEventListener('click', signIn);
      els.signOutBtn.addEventListener('click', signOut);

      // ---- Feed ----------------------------------------------------------

      function renderPosts(rows) {
        if (!rows || rows.length === 0) {
          els.posts.innerHTML = '<p class="empty">No posts yet — be the first to share!</p>';
          return;
        }
        els.posts.innerHTML = rows
          .map((row) => {
            const author = row.Users && row.Users.Name ? row.Users.Name : 'Unknown';
            const titleHtml = row.title
              ? `<div class="post-title">${escapeHtml(row.title)}</div>`
              : '';
            return `
              <div class="post">
                <div class="post-head">
                  <span class="post-author">${escapeHtml(author)}</span>
                  <span class="post-time">${escapeHtml(formatTime(row.created_at))}</span>
                </div>
                ${titleHtml}
                <div class="post-content">${escapeHtml(row.content)}</div>
              </div>`;
          })
          .join('');
      }

      async function loadFeed() {
        const { data, error } = await supabase
          .from('Posts')
          .select('post-id, title, content, created_at, Users(Name)')
          .order('created_at', { ascending: false })
          .limit(100);
        if (error) {
          els.posts.innerHTML =
            '<p class="empty">Could not load the feed. Please try again later.</p>';
          console.error(error);
          return;
        }
        renderPosts(data);
      }

      els.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const title = els.title.value.trim();
        const content = els.content.value.trim();
        if (!content) return;
        if (!currentProfile) {
          els.status.textContent = 'Please sign in first.';
          return;
        }

        els.postBtn.disabled = true;
        els.status.textContent = 'Posting…';
        try {
          const { error } = await supabase.from('Posts').insert({
            title: title || null,
            content,
            'creator-id': currentProfile['creator-id'],
          });
          if (error) throw error;
          els.content.value = '';
          els.title.value = '';
          els.status.textContent = 'Posted!';
          setTimeout(() => (els.status.textContent = ''), 2000);
          loadFeed();
        } catch (err) {
          els.status.textContent = 'Something went wrong. Please try again.';
          console.error(err);
        } finally {
          els.postBtn.disabled = false;
        }
      });

      // ---- Init ----------------------------------------------------------
      (async () => {
        const { data } = await supabase.auth.getSession();
        await applyAuthState(data.session);
        loadFeed();
      })();
    </script>
  </body>
</html>
