<html>
  <head>
    <meta charset="utf-8" />
    <title>ConnectEd · Eurovision</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="blob-container">
      <div class="blob blob1"></div>
      <div class="blob blob2"></div>
      <div class="blob blob3"></div>
    </div>

    <div class="content-wrapper">
      <header class="hero">
        <h1>EUROVISION</h1>
        <p>Welcome to our <span style="font-family: 'Orbitron', sans-serif;">EUROVISION</span> landing site.</p>
      </header>

      <div class="section-grid">
        <section class="section-card">
          <h2>Last 3 Eurovision winners</h2>
          <p>Recent winners include Switzerland in 2024 with Nemo performing “The Code”, Austria in 2025 with JJ and “Wasted Love”, and Bulgaria this year with DARA performing “BANGARANGA”.</p>
          <div class="media-grid">
            <iframe src="https://www.youtube.com/embed/CO_qJf-nW0k?si=u8ctk95UvW9WOrq1" title="Nemo - The Code" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <iframe src="https://www.youtube.com/embed/onOex2WXjbA?si=q2nMkp0muVfyjG8P" title="JJ - Wasted Love" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
          </div>
          <div class="media-grid">
            <div id="player"></div>
          </div>
        </section>

        <section class="section-card">
          <div class="actions-row">
            <a class="button-link" href="../index.html">
              <button>Go back home</button>
            </a>
          </div>
        </section>
      </div>

      <script>
        // 2. This code loads the IFrame Player API code asynchronously.
        var tag = document.createElement('script');

        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. This function creates an <iframe> (and YouTube player)
        //    after the API code downloads.
        var player;
        function onYouTubeIframeAPIReady() {
          player = new YT.Player('player', {
            height: '390',
            width: '640',
            videoId: '4Mxq2WCAhT4',
            playerVars: {
              'playsinline': 1
            },
            events: {
              'onReady': onPlayerReady,
              'onStateChange': onPlayerStateChange
            }
          });
        }

        // 4. The API will call this function when the video player is ready.
        function onPlayerReady(event) {
          event.target.playVideo();
        }

        // 5. The API calls this function when the player's state changes.
        //    The function indicates that when playing a video (state=1),
        //    the player should play for six seconds and then stop.
        var done = false;
        function onPlayerStateChange(event) {
          if (event.data == YT.PlayerState.PLAYING && !done) {
            setTimeout(stopVideo, 6000);
            done = true;
          }
        }
        function stopVideo() {
          player.stopVideo();
        }
      </script>
    </div>

  </body>
</html>
